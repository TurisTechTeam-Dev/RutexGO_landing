<div class="carousel-viewport" 
     (mousedown)="onMouseDown($event)" 
     (mouseup)="onMouseUp($event)"
     (mouseleave)="iniciarAutoplay()"> <div class="carousel-track" 
       [style.transform]="'translateX(' + (-indiceActual * 100) + '%)'">
    
    <img *ngFor="let foto of fotos" 
         [src]="foto" 
         class="carousel-img" 
         draggable="false">
    
  </div>
</div>
